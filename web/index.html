<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <title>No-Hitter Tracker</title>
    <link rel="icon" href="https://arodsg.com/img/sg_logo_circle_transbg.png">
    <link rel="stylesheet" href="https://arodsg.com/css/fonts.css" type="text/css" charset="utf-8" />
    <link rel="stylesheet" href="nohittertracker.css" type="text/css" charset="utf-8" />
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <script src="https://arodsg.com/js/JQuery/jquery-3.4.1.min.js" type="text/javascript"></script>
    <script src="https://arodsg.com/js/JQuery/jquery-ui-1.12.1.min.js" type="text/javascript"></script>
    <script src="nohittertracker.js" type="text/javascript"></script>
</head>

<body>
    <div id="loaderContainer">
        <div class="loader"></div>
    </div>

    <div id="settingsWrapper">
        <div id="favoriteTeamContainer" class="settingsItem">
            <label>Favorite team:</label>
            <select id="favoriteTeam" name="favoriteTeam">
                <option value="none">--None--</option>
            </select>
        </div>
    </div>

    <h1>No-Hitter Tracker</h1>

    <p id="lastUpdated">Last updated: <span id="lastUpdatedTime">n/a</span></p>

    <div id="contentContainer">
        <div id="dateContainer">
            <div id="datePickerContainer">
                <div id="arrowLeftContainer" class="arrowContainer"><i class="arrow arrowLeft"></i></div>
                <input type="text" id="datepicker">
                <div id="arrowRightContainer" class="arrowContainer"><i class="arrow arrowRight"></i></div>
                <button id="todayButton" type="button">Today</button>
            </div>
        </div>

        <div id="filterGamesContainer">
            <input type="text" id="filterGamesInput" class="filterInput" onkeyup="filterGames()" placeholder="Filter games...">
        </div>

        <div id="gamesContainer"></div>

        <div id="gamesMessage" hidden></div>
    </div>
</body>
</html>
